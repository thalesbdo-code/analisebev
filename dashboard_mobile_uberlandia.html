var CAT_DATA=[1088,602,587,462];

function fm(n){return n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function cat(r){if(r.i)return 'inativo';if(r.p>50)return 'critica';if(r.p>=20)return 'moderada';return 'leve';}
function ccls(c){return {inativo:'gy',critica:'rd',moderada:'or',leve:'yl'}[c]||'gy';}
function cbrd(c){return {inativo:'',critica:'rd',moderada:'or',leve:'yl'}[c]||'';}

var dCtx=document.getElementById('dntC').getContext('2d');
new Chart(dCtx,{
    type:'doughnut',
    data:{
        labels:['⛔ Inativos (1088)','🔴 Crítica (602)','🟠 Moderada (587)','🟡 Leve (462)'],
        datasets:[{
            data:CAT_DATA,
            backgroundColor:['#9ca3af','#E4002B','#FF8C00','#f59e0b'],
            borderWidth:2,borderColor:'#fff',hoverOffset:4
        }]
    },
    options:{
        responsive:true,maintainAspectRatio:false,cutout:'55%',
        plugins:{
            legend:{position:'bottom',labels:{font:{size:10,weight:'500'},padding:8,usePointStyle:true}},
            tooltip:{callbacks:{label:function(c){return c.raw+' PDVs';}}}
        }
    }
});

var filt=[].concat(D);
var show=30;

function render(){
    var box=document.getElementById('pdvlist');
    box.innerHTML='';
    var n=Math.min(show,filt.length);
    for(var i=0;i<n;i++){
        var r=filt[i];
        var c=cat(r);
        var cl=ccls(c);
        var bc=cbrd(c);
        var div=document.createElement('div');
        div.className='pdvc'+(bc?' '+bc:'');
        div.onclick=(function(idx){return function(){
            var d=document.getElementById('dg'+idx);
            if(d) d.classList.toggle('open');
        };})(i);
        div.innerHTML='<div class="pdvc-top"><div class="pdvc-name">'+r.n+'</div><span class="pdvc-pct '+cl+'">'+r.p.toLocaleString('pt-BR',{minimumFractionDigits:1})+'%</span></div>'
            +'<div class="pdvc-row"><span>Cód: '+r.c+'</span><span class="pdvc-gap">Gap: '+fm(r.g)+' HL</span></div>'
            +'<div class="pdvc-tap">Toque para ver diagnóstico ▼</div>'
            +'<div class="pdvc-diag" id="dg'+i+'">'+(r.d||'Diagnóstico não disponível.')+'</div>';
        box.appendChild(div);
    }
    var btn=document.getElementById('lbtn');
    btn.style.display='block';
    if(show>=filt.length){
        btn.disabled=true;
        btn.textContent='✅ Todos exibidos ('+filt.length+')';
    } else {
        btn.disabled=false;
        btn.textContent='📋 Carregar mais ('+n+'/'+filt.length+')';
    }
    document.getElementById('scnt').textContent=filt.length+' PDVs encontrados';
}

function doFilter(){
    var s=document.getElementById('srcIn').value.toLowerCase();
    var st=document.getElementById('stFil').value;
    filt=D.filter(function(r){
        var ms=r.n.toLowerCase().indexOf(s)>=0||r.c.toString().indexOf(s)>=0;
        var mt=true;
        if(st==='inativo') mt=r.i===1;
        else if(st==='critica') mt=r.i===0&&r.p>50;
        else if(st==='moderada') mt=r.i===0&&r.p>=20&&r.p<=50;
        else if(st==='leve') mt=r.i===0&&r.p<20;
        return ms&&mt;
    });
    show=30;
    render();
}

function loadMore(){
    show+=30;
    render();
}

window.onload=function(){render();};

} catch(e){
    var eb=document.getElementById('errbox');
    if(eb){eb.style.display='block';eb.textContent='Erro: '+e.message;}
}
